<!-- HIVE Logo - Dark Background Version (Concept A) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <linearGradient id="lightGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA"/>
      <stop offset="100%" style="stop-color:#38BDF8"/>
    </linearGradient>
    <filter id="glowDark">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="320" height="80" fill="#0F0A1E" rx="8"/>

  <!-- Hexagon symbol -->
  <polygon
    points="40,6 58,16 58,36 40,46 22,36 22,16"
    fill="none"
    stroke="url(#lightGrad)"
    stroke-width="2"
    filter="url(#glowDark)"
  />
  <polygon
    points="40,14 52,21 52,35 40,42 28,35 28,21"
    fill="none"
    stroke="url(#lightGrad)"
    stroke-width="0.8"
    opacity="0.4"
  />

  <!-- Node connections -->
  <line x1="40" y1="6" x2="40" y2="14" stroke="url(#lightGrad)" stroke-width="1" opacity="0.6"/>
  <line x1="58" y1="16" x2="52" y2="21" stroke="url(#lightGrad)" stroke-width="1" opacity="0.6"/>
  <line x1="58" y1="36" x2="52" y2="35" stroke="url(#lightGrad)" stroke-width="1" opacity="0.6"/>
  <line x1="40" y1="46" x2="40" y2="42" stroke="url(#lightGrad)" stroke-width="1" opacity="0.6"/>
  <line x1="22" y1="36" x2="28" y2="35" stroke="url(#lightGrad)" stroke-width="1" opacity="0.6"/>
  <line x1="22" y1="16" x2="28" y2="21" stroke="url(#lightGrad)" stroke-width="1" opacity="0.6"/>

  <!-- Glowing nodes -->
  <circle cx="40" cy="6" r="2.5" fill="#F59E0B" filter="url(#glowDark)"/>
  <circle cx="58" cy="16" r="2.5" fill="#F59E0B" filter="url(#glowDark)"/>
  <circle cx="58" cy="36" r="2.5" fill="#F59E0B" filter="url(#glowDark)"/>
  <circle cx="40" cy="46" r="2.5" fill="#F59E0B" filter="url(#glowDark)"/>
  <circle cx="22" cy="36" r="2.5" fill="#F59E0B" filter="url(#glowDark)"/>
  <circle cx="22" cy="16" r="2.5" fill="#F59E0B" filter="url(#glowDark)"/>
  <circle cx="40" cy="28" r="4" fill="url(#lightGrad)" filter="url(#glowDark)"/>

  <!-- Wordmark -->
  <text
    x="74"
    y="33"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="26"
    font-weight="800"
    letter-spacing="4"
    fill="url(#lightGrad)"
    filter="url(#glowDark)"
  >HIVE</text>

  <text
    x="75"
    y="47"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="8"
    font-weight="300"
    letter-spacing="3.5"
    fill="#94A3B8"
  >AI AGENT SYSTEM</text>

  <!-- Decorative line -->
  <line x1="74" y1="51" x2="210" y2="51" stroke="url(#lightGrad)" stroke-width="0.5" opacity="0.3"/>
</svg>
