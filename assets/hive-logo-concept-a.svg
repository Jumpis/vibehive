<!-- HIVE Logo - Concept A: Neural Hive -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06B6D4;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer hexagon -->
  <polygon
    points="40,6 58,16 58,36 40,46 22,36 22,16"
    fill="url(#primaryGrad)"
    filter="url(#glow)"
    opacity="0.95"
  />

  <!-- Inner honeycomb pattern -->
  <polygon
    points="40,12 53,19.5 53,34.5 40,42 27,34.5 27,19.5"
    fill="none"
    stroke="rgba(255,255,255,0.3)"
    stroke-width="0.8"
  />

  <!-- Center small hexagon -->
  <polygon
    points="40,20 47,24 47,32 40,36 33,32 33,24"
    fill="rgba(255,255,255,0.15)"
    stroke="rgba(255,255,255,0.6)"
    stroke-width="0.8"
  />

  <!-- Neural connection lines -->
  <line x1="40" y1="6" x2="40" y2="20" stroke="rgba(255,255,255,0.5)" stroke-width="0.8"/>
  <line x1="58" y1="16" x2="47" y2="24" stroke="rgba(255,255,255,0.5)" stroke-width="0.8"/>
  <line x1="58" y1="36" x2="47" y2="32" stroke="rgba(255,255,255,0.5)" stroke-width="0.8"/>
  <line x1="40" y1="46" x2="40" y2="36" stroke="rgba(255,255,255,0.5)" stroke-width="0.8"/>
  <line x1="22" y1="36" x2="33" y2="32" stroke="rgba(255,255,255,0.5)" stroke-width="0.8"/>
  <line x1="22" y1="16" x2="33" y2="24" stroke="rgba(255,255,255,0.5)" stroke-width="0.8"/>

  <!-- Node dots at vertices -->
  <circle cx="40" cy="6" r="2" fill="#F59E0B"/>
  <circle cx="58" cy="16" r="2" fill="#F59E0B"/>
  <circle cx="58" cy="36" r="2" fill="#F59E0B"/>
  <circle cx="40" cy="46" r="2" fill="#F59E0B"/>
  <circle cx="22" cy="36" r="2" fill="#F59E0B"/>
  <circle cx="22" cy="16" r="2" fill="#F59E0B"/>

  <!-- Center node -->
  <circle cx="40" cy="28" r="3.5" fill="white" opacity="0.9"/>
  <circle cx="40" cy="28" r="1.5" fill="url(#primaryGrad)"/>

  <!-- "HIVE" text -->
  <text
    x="74"
    y="32"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="26"
    font-weight="800"
    letter-spacing="4"
    fill="url(#primaryGrad)"
  >HIVE</text>

  <!-- Tagline -->
  <text
    x="75"
    y="46"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="8"
    font-weight="400"
    letter-spacing="3.5"
    fill="#94A3B8"
  >AI AGENT SYSTEM</text>

  <!-- Decorative accent line -->
  <line x1="74" y1="50" x2="200" y2="50" stroke="url(#primaryGrad)" stroke-width="0.5" opacity="0.4"/>
</svg>
