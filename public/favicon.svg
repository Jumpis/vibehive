<!-- HIVE Favicon / Icon Version -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="favGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
    <filter id="favGlow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#0F0A1E"/>

  <!-- Hexagon -->
  <polygon
    points="16,3 25,8 25,18 16,23 7,18 7,8"
    fill="url(#favGrad)"
    opacity="0.95"
  />

  <!-- Inner hexagon outline -->
  <polygon
    points="16,7 22,10.5 22,17.5 16,21 10,17.5 10,10.5"
    fill="none"
    stroke="rgba(255,255,255,0.25)"
    stroke-width="0.5"
  />

  <!-- Center node -->
  <circle cx="16" cy="13" r="2.5" fill="white" opacity="0.9"/>

  <!-- Corner nodes -->
  <circle cx="16" cy="3"  r="1.2" fill="#F59E0B"/>
  <circle cx="25" cy="8"  r="1.2" fill="#F59E0B"/>
  <circle cx="25" cy="18" r="1.2" fill="#F59E0B"/>
  <circle cx="16" cy="23" r="1.2" fill="#F59E0B"/>
  <circle cx="7"  cy="18" r="1.2" fill="#F59E0B"/>
  <circle cx="7"  cy="8"  r="1.2" fill="#F59E0B"/>

  <!-- "HIVE" lettermark at bottom -->
  <text
    x="16"
    y="30"
    font-family="'Inter', Arial, sans-serif"
    font-size="6"
    font-weight="800"
    letter-spacing="1"
    fill="url(#favGrad)"
    text-anchor="middle"
  >HIVE</text>
</svg>
